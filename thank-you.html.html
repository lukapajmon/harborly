<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you · Harborly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf8f4;
  --gold:#b8965a;
  --navy:#0a1628;
  --ink2:#5a5248;
  --ink3:#8a8078;
  --border:rgba(184,150,90,0.2);
  --serif:'Cormorant Garamond',serif;
  --sans:'Jost',sans-serif;
}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--cream);
  color:var(--navy);
  display:flex;flex-direction:column;
  min-height:100vh;
}
nav{
  padding:28px 48px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(42,36,32,0.08);
}
.nav-logo{font-family:var(--serif);font-size:22px;letter-spacing:0.12em;color:var(--navy)}
.nav-logo span{color:var(--gold)}
.hero{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:60px 40px;
  max-width:600px;margin:0 auto;
}
.eyebrow{
  font-size:10px;letter-spacing:0.32em;text-transform:uppercase;
  color:var(--gold);margin-bottom:24px;
  display:flex;align-items:center;gap:14px;
}
.eyebrow::before,.eyebrow::after{content:'';width:32px;height:1px;background:var(--gold);opacity:0.4}
.title{
  font-family:var(--serif);font-size:clamp(36px,5vw,56px);
  font-weight:300;font-style:italic;color:var(--navy);
  margin-bottom:16px;line-height:1.1;
}
.rule{width:40px;height:1px;background:var(--gold);margin:0 auto 28px;opacity:0.5}
.desc{
  font-size:15px;font-weight:300;color:var(--ink2);
  line-height:1.8;margin-bottom:44px;
}
.btn{
  display:inline-flex;align-items:center;
  background:var(--navy);color:var(--cream);
  font-family:var(--sans);font-size:11px;font-weight:500;
  letter-spacing:0.2em;text-transform:uppercase;
  padding:15px 36px;text-decoration:none;
  border:1px solid var(--navy);transition:all 0.25s;
}
.btn:hover{background:transparent;color:var(--navy)}
footer{
  border-top:1px solid rgba(42,36,32,0.08);
  padding:28px 48px;text-align:center;
}
.footer-note{font-size:11px;color:var(--ink3);letter-spacing:0.06em}
.footer-logo{font-family:var(--serif);font-size:16px;color:var(--ink3);letter-spacing:0.1em;margin-bottom:6px}
.footer-logo span{color:var(--gold)}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Harbor<span>ly</span></div>
</nav>

<div class="hero">
  <div class="eyebrow">Message received</div>
  <h1 class="title">Thank you for reaching out.</h1>
  <div class="rule"></div>
  <p class="desc">We have received your inquiry and will be in touch shortly.<br>We look forward to welcoming you to Harborly.</p>
  <a href="javascript:history.back()" class="btn">Back to Harborly</a>
</div>

<footer>
  <div class="footer-logo">Harbor<span>ly</span></div>
  <div class="footer-note">harborly.eu · Maritime Service Marketplace · Adriatic</div>
</footer>

</body>
</html>
